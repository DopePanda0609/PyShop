{% extends 'base.html' %}
{% load static %}

{% block title %}{{ product.name }} - QuikKart{% endblock %}

{% block content %}
<div class="pd-page">

  <!-- Back button -->
  <a href="javascript:history.back()" class="back-btn" style="margin-bottom: 1rem; display: inline-flex;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
  </a>

  <!-- Product Image (fixed size) -->
  <div class="pd-image-box">
    <img src="{{ product.image_url }}" alt="{{ product.name }}" class="pd-image">
  </div>

  <!-- Info Card -->
  <div class="pd-info-card">
    <div class="pd-category-badge">{{ product.get_category_display }}</div>
    <h1 class="pd-name">{{ product.name }}</h1>
    <div class="pd-meta-row">
      <span class="pd-price">${{ product.price }}</span>
      <span class="pd-stock">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        {{ product.stock }} in stock
      </span>
    </div>

    <div class="pd-delivery-row">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span>Delivered in <strong>16 minutes</strong></span>
    </div>

    <form action="{% url 'cart:cart_add' product.id %}" method="post" class="pd-form">
      {% csrf_token %}
      <div class="pd-qty-row">
        <label for="quantity" class="pd-qty-label">Quantity</label>
        <div class="pd-qty-select-wrap">
          <select name="quantity" id="quantity" class="pd-qty-select">
            {% for i in "12345"|make_list %}
              <option value="{{ i }}">{{ i }}</option>
            {% endfor %}
          </select>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" class="pd-qty-arrow"><path d="M6 9l6 6 6-6"/></svg>
        </div>
      </div>
      <button type="submit" class="pd-add-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Add to Cart
      </button>
    </form>
  </div>

</div>

<style>
.pd-page {
  padding: 0;
}

.pd-image-box {
  width: 100%;
  height: 220px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f9fafb;
  border-radius: 14px;
  margin-bottom: 1rem;
  overflow: hidden;
  border: 1px solid #e5e7eb;
}

.pd-image {
  max-height: 100%;
  max-width: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
}

.pd-info-card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
  padding: 1.25rem;
}

.pd-category-badge {
  display: inline-block;
  background: #dcfce7;
  color: #16a34a;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.pd-name {
  font-size: 1.25rem;
  font-weight: 800;
  color: #1f2937;
  margin-bottom: 0.6rem;
  line-height: 1.3;
}

.pd-meta-row {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 0.75rem;
}

.pd-price {
  font-size: 1.6rem;
  font-weight: 800;
  color: #1f2937;
}

.pd-stock {
  font-size: 0.75rem;
  color: #6b7280;
  display: flex;
  align-items: center;
  gap: 4px;
}

.pd-delivery-row {
  font-size: 0.8rem;
  color: #374151;
  display: flex;
  align-items: center;
  gap: 6px;
  background: #f0fdf4;
  border-radius: 8px;
  padding: 0.5rem 0.75rem;
  margin-bottom: 1.25rem;
}

.pd-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.pd-qty-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.pd-qty-label {
  font-size: 0.875rem;
  font-weight: 600;
  color: #374151;
}

.pd-qty-select-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.pd-qty-select {
  appearance: none;
  border: 1.5px solid #e5e7eb;
  border-radius: 8px;
  padding: 0.4rem 2rem 0.4rem 0.75rem;
  font-size: 0.875rem;
  font-family: inherit;
  color: #1f2937;
  background: white;
  cursor: pointer;
  outline: none;
}

.pd-qty-select:focus { border-color: #16a34a; }

.pd-qty-arrow {
  position: absolute;
  right: 8px;
  pointer-events: none;
}

.pd-add-btn {
  width: 100%;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 0.9rem;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  transition: background 0.2s, transform 0.15s;
}

.pd-add-btn:hover { background: #15803d; transform: translateY(-1px); }
.pd-add-btn:active { transform: scale(0.98); }
</style>

{% endblock %}
